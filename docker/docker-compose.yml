services:
  # ===================
  # Frontend - Next.js
  # ===================
  web:
    build:
      context: ..
      dockerfile: docker/services/web/Dockerfile
      target: production
    container_name: thinkspace-web
    restart: unless-stopped
    ports:
      - "8801:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
      - NEXT_PUBLIC_STRAPI_URL=${NEXT_PUBLIC_STRAPI_URL}
      - STRAPI_URL=${STRAPI_URL:-http://cms:1337}
      - STRAPI_API_TOKEN=${STRAPI_API_TOKEN}
      - REVALIDATION_SECRET=${REVALIDATION_SECRET}
    depends_on:
      - cms
    networks:
      - thinkspace-network

  # ===================
  # CMS - Strapi 5
  # ===================
  cms:
    build:
      context: ../apps/cms
      dockerfile: ../../docker/services/cms/Dockerfile
      target: production
    container_name: thinkspace-cms
    restart: unless-stopped
    ports:
      - "8101:1337"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - HOST=0.0.0.0
      - PORT=1337
      - PUBLIC_URL=${STRAPI_PUBLIC_URL:-http://localhost:8101}
      - APP_KEYS=${STRAPI_APP_KEYS}
      - API_TOKEN_SALT=${STRAPI_API_TOKEN_SALT}
      - ADMIN_JWT_SECRET=${STRAPI_ADMIN_JWT_SECRET}
      - TRANSFER_TOKEN_SALT=${STRAPI_TRANSFER_TOKEN_SALT}
      - JWT_SECRET=${STRAPI_JWT_SECRET}
      - DATABASE_CLIENT=postgres
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - DATABASE_NAME=${POSTGRES_DB:-thinkspace}
      - DATABASE_USERNAME=${POSTGRES_USER:-postgres}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD}
      - DATABASE_SSL=false
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - cms-uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - thinkspace-network

  # ===================
  # Database - PostgreSQL
  # ===================
  db:
    image: postgres:15-alpine
    container_name: thinkspace-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-thinkspace}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-thinkspace}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - thinkspace-network

networks:
  thinkspace-network:
    driver: bridge

volumes:
  cms-uploads:
  postgres-data:
