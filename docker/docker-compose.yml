services:
  # ===================
  # Frontend - Next.js
  # ===================
  web:
    build:
      context: ..
      dockerfile: docker/services/web/Dockerfile
      target: production
    container_name: thinkspace-web
    restart: unless-stopped
    ports:
      - "8801:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
      - NEXT_PUBLIC_STRAPI_URL=${NEXT_PUBLIC_STRAPI_URL}
      - STRAPI_URL=${STRAPI_URL:-http://cms:1337}
      - STRAPI_API_TOKEN=${STRAPI_API_TOKEN}
      - REVALIDATION_SECRET=${REVALIDATION_SECRET}
    depends_on:
      - cms
    networks:
      - thinkspace-network

  # ===================
  # CMS - Strapi 5 (SQLite)
  # ===================
  cms:
    build:
      context: ../apps/cms
      dockerfile: ../../docker/services/cms/Dockerfile
      target: production
    container_name: thinkspace-cms
    restart: unless-stopped
    ports:
      - "8101:1337"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - HOST=0.0.0.0
      - PORT=1337
      - PUBLIC_URL=${STRAPI_PUBLIC_URL:-http://localhost:8101}
      - APP_KEYS=${STRAPI_APP_KEYS}
      - API_TOKEN_SALT=${STRAPI_API_TOKEN_SALT}
      - ADMIN_JWT_SECRET=${STRAPI_ADMIN_JWT_SECRET}
      - TRANSFER_TOKEN_SALT=${STRAPI_TRANSFER_TOKEN_SALT}
      - JWT_SECRET=${STRAPI_JWT_SECRET}
      - DATABASE_CLIENT=sqlite
      - DATABASE_FILENAME=/app/data/data.db
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - cms-uploads:/app/public/uploads
      - cms-data:/app/data
    networks:
      - thinkspace-network

networks:
  thinkspace-network:
    driver: bridge

volumes:
  cms-uploads:
  cms-data:
