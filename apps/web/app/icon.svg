  <path transform="translate(330 96) scale(5.6)"
        d="M12 3 11 8a2 2 0 0 1-1 1l-5 1 5 1a2 2 0 0 1 1 1l1 5 1-5a2 2 0 0 1 1-1l5-1-5-1a2 2 0 0 1-1-1Z"
