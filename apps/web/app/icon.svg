<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ThinkSpace">
  <defs>
    <linearGradient id="ts-bg" x1="64" y1="48" x2="448" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#15803d"/>
      <stop offset="0.55" stop-color="#16a34a"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="ts-sheen" x1="256" y1="40" x2="256" y2="300" gradientUnits="userSpaceOnUse">
