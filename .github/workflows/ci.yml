name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ===========================================
  # Build & Test
  # ===========================================
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check - Web
        working-directory: apps/web
        run: bun run typecheck || true

      - name: Type check - CMS
        working-directory: apps/cms
        run: bun run build
        env:
          NODE_ENV: production

      - name: Build Web
        working-directory: apps/web
        run: bun run build
        env:
          NEXT_PUBLIC_SITE_URL: https://techthinkspace.com
          NEXT_PUBLIC_STRAPI_URL: https://cms.techthinkspace.com
          STRAPI_URL: http://localhost:1337

  # ===========================================
  # Build Docker Images
  # ===========================================
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/services/web/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push CMS image
        uses: docker/build-push-action@v5
        with:
          context: apps/cms
          file: docker/services/cms/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/cms:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/cms:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================
  # Deploy to Production
  # ===========================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ${{ secrets.PROJECT_PATH || '/home/thinkspace/thinkspacesite' }}
            git pull origin main
            docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml pull
            docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml up -d --build
            docker system prune -f
